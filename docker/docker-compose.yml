version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      AWS_REGION: us-east-1

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: ${API_URL:-http://localhost:3001}
